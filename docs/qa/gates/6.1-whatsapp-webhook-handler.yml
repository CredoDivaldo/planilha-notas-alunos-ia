schema: 1
story: '6.1'
gate: CONCERNS
status_reason: >
  All 5 acceptance criteria are met and 26 tests pass (16 unit + 10 integration).
  Two non-blocking medium-severity issues are documented: asyncio.run() called
  inside an async FastAPI handler (runtime risk under ASGI), and AC-4 student-not-found
  guard is delegated to the pipeline layer rather than enforced at the route boundary.
  Story may proceed to Done; issues should be addressed in Story 6.3 or a follow-up task.
reviewer: Quinn
updated: '2026-06-03T00:00:00Z'

checks:
  code_review:
    status: pass
    notes: >
      Code is well-structured with clear separation of concerns: token validation
      as a FastAPI Dependency, phone normalisation isolated in utils/phone.py,
      Pydantic models with ConfigDict(extra="allow") for payload flexibility.
      SQLAlchemy session lifecycle managed with try/finally in both endpoints.
      Import of `text` is duplicated (line 27 and line 316) — minor MNT issue.
      asyncio.run() inside an async handler is a pattern concern (see MNT-001).

  unit_tests:
    status: pass
    notes: >
      16 unit tests in test_phone_normalization.py cover all documented phone
      formats: Angola (+244), Portugal (+351), plain digits, spaces, hyphens,
      dots, parentheses, @s.whatsapp.net suffix, empty string, non-digit-only
      strings, and complex mixed formats. All edge cases documented in Dev Notes
      are covered.

  acceptance_criteria:
    status: pass
    notes: >
      AC-1 (webhook secured, 200 OK): Verified — token dependency gates entry;
        valid requests return 200 WebhookResponse immediately.
      AC-2 (invalid token 401): Verified — missing token → 401 with detail
        "Missing X-Webhook-Token header"; wrong token → 401 "Invalid X-Webhook-Token".
        Logs rejected attempt via LOGGER.warning("webhook_auth_failed").
      AC-3 (student identified by phone): Verified — normalize_phone() applied
        to remoteJid before SQL query on students.phone column.
      AC-4 (unknown phone handled gracefully): Partially verified — the route
        itself passes the normalized_phone to pipeline.process_message(); the
        "no AI call / no data exposure" guarantee is enforced inside
        ChatbotPipeline (Story 6.3 scope), not at the route boundary. This is
        architecturally acceptable given the story's OUT-of-scope items, but
        is noted as REQ-001.
      AC-5 (non-message events ignored silently): Verified — event != "messages.upsert"
        returns 200 silently; messageType != "conversation" returns 200 silently.

  no_regressions:
    status: pass
    notes: >
      Chatbot router is additive (include_router); portal router and health
      endpoint are untouched. Session factory initialised once in lifespan and
      shared via app.state — no collision with existing portal routes.

  performance:
    status: pass
    notes: >
      Endpoint returns 200 immediately for all non-processable events (AC-5)
      without touching the DB. For valid messages the DB is queried once.
      asyncio.run() inside async handler (MNT-001) could block the event loop
      under concurrent load — flagged as medium severity.

  security:
    status: pass
    notes: >
      Token comparison is direct string equality (not timing-safe hmac.compare_digest).
      For a webhook shared secret this is a low-severity concern; token is not
      user-facing and is expected to be a high-entropy random string.
      OWASP basics: no SQL injection (parameterised queries via SQLAlchemy text()
      with named bind params); no data exposed on unknown phone (AC-4 path returns
      200 with no student data); 500 raised if CHATBOT_WEBHOOK_TOKEN is not
      configured (prevents silent open-door failure). Logged remote_addr on auth
      failure supports audit trail.

  documentation:
    status: pass
    notes: >
      .env.example updated with CHATBOT_WEBHOOK_TOKEN, CHATBOT_RATE_LIMIT_DAILY,
      AI_PROVIDER, AI_MODEL, BAIDU_API_KEY with generation hint for token.
      Module-level docstring in chatbot.py maps ACs to implementation.
      Dev Notes in story include webhook payload structure and normalisation rules.
      [Sync 2026-06-08] BAIDU_API_KEY replaced by DEEPSEEK_API_KEY in
      .env.example; AI_PROVIDER default switched to deepseek. Gate verdict
      unchanged — this is a configuration sync, not a behaviour change in
      Story 6.1 scope. See docs/qa/change-proposals/2026-06-08-deepseek-switch.md
      and Story 9.0 gate for the actual provider-switch QA evidence.

top_issues:
  - id: MNT-001
    severity: medium
    category: code
    description: >
      asyncio.run() called at line 337 inside an async FastAPI handler
      (receive_webhook). asyncio.run() creates a new event loop and blocks the
      calling thread; calling it from within a running event loop (ASGI) raises
      RuntimeError in production and may degrade throughput under concurrent load.
    recommendation: >
      Replace asyncio.run(pipeline.process_message(...)) with
      `await pipeline.process_message(...)` since the handler is already async.
      If background execution is needed, use FastAPI BackgroundTasks or
      anyio.from_thread.run_sync(). Address in Story 6.3.

  - id: REQ-001
    severity: medium
    category: code
    description: >
      AC-4 requires "does NOT call the AI service or expose any data" for
      unknown phone numbers. This guarantee is currently enforced inside
      ChatbotPipeline.process_message() (Story 6.3 scope) rather than at the
      route boundary. If ChatbotPipeline is misconfigured, the route will not
      independently reject the call.
    recommendation: >
      Add an explicit guard at the route boundary: if student_row is None, log
      and return 200 without calling the pipeline. This makes AC-4 compliance
      route-level and independent of pipeline implementation details.

  - id: MNT-002
    severity: low
    category: code
    description: >
      `from sqlalchemy import text` is imported twice: at module level (line 27)
      and again inside the handler body (line 316). The inner import is redundant.
    recommendation: Remove the duplicate import inside receive_webhook().

waiver:
  active: false
