  - id: MNT-001
    severity: low
    category: MNT
    file: backend/app/models/publication.py
    line: 211
    description: >
      NotificationDelivery.updated_at uses `onupdate=datetime.utcnow` (bare reference
      to the deprecated datetime.utcnow method). Python 3.12+ emits a DeprecationWarning.
      All other timestamp fields in the codebase use the timezone-aware
      `lambda: datetime.now(UTC)` pattern already adopted in this story.
    recommendation: >
      Replace `onupdate=datetime.utcnow` with `onupdate=lambda: datetime.now(UTC)`
      to be consistent with the rest of the model layer. Low-risk, one-line fix.
    blocking: false

