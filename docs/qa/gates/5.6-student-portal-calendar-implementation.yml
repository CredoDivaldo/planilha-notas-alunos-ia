top_issues:
  - id: DOC-001
    severity: low
    category: docs
    description: >
      CalendarEvent Pydantic model in routes.py declares published_at as str (required,
      non-optional), but the service layer serializes it as Optional (None when
      published_at is NULL). If an unpublished snapshot with NULL published_at were ever
      returned, Pydantic validation would raise a 500. The is_published=True filter
      prevents this today, but the schema mismatch is a latent inconsistency.
    recommendation: >
      Change CalendarEvent.published_at to `str | None = None` to align with the
      service output contract, or add a DB constraint ensuring published_at IS NOT NULL
      when is_published=True.
