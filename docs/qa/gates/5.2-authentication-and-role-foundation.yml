notes: >
  password.py: Argon2id parameters (time_cost=3, memory_cost=64MiB, parallelism=4) are
  appropriate for a local academic platform. needs_rehash() is included for future
  parameter upgrades. Cleartext is explicitly never logged — confirmed by code inspection.

  sessions.py: Session IDs are 128 hex chars (64 bytes from secrets.token_hex) — 512-bit
  entropy, well above recommended minimums. HttpOnly and SameSite=Lax are documented in
  module docstring as the cookie baseline; actual cookie-setting is deferred to route
  layer (acceptable for a foundation story scoped to the session store). Session rotation
  on login (prevents session fixation) and on password change is implemented correctly.

  middleware.py: Structured auth event logging covers all required event types (login,
  failed_login, password_change, delegate_assignment, sensitive_op_approval_state_change,
  logout, session_rotation). Failure reason categories are deliberately coarse to avoid
  enumeration attacks. No secrets or tokens are logged — confirmed by code inspection.

  migration (0002): user_sessions, delegate_assignments, and pending_credential_deliveries
  are cleanly structured. delegate_assignments.requires_professor_validation defaults to
  true (non-negotiable for sensitive actions). pending_credential_deliveries stores only
  masked destination — never raw cleartext credentials. downgrade() reverses all changes
  in correct FK-safe order. audit_log extension is additive (nullable columns on existing
  rows).

  role-capability-matrix.md: Documents ALLOW, BLOCK, and REQUIRES_PROFESSOR_VALIDATION
  boundaries clearly for all four roles across all sensitive actions. Delegate scoping
  rules (state=approved required, rights not cumulative, per-context approval) are
  explicitly stated.

  rate_limiting: Not yet implemented in code, but correctly documented in docs/api/README.md
  with specific thresholds and the failure_reason constant is defined in middleware.py.
  Deferral to a future story is appropriate for a local MVP foundation.

  Minor observation: auth_context_middleware does not yet perform actual session validation
  (deferred to route-level dependencies). This is architecturally sound — the middleware
  only initialises the context attributes so routes have a consistent interface. No
  concern raised as this matches the foundation-only scope of Story 5.2.
