schema: 1
story: '9.1'
gate: CONCERNS
status_reason: >
  Story 9.1 is an acceptance run for the real Evolution → FastAPI → DeepSeek
  → WhatsApp loop. It is a partial-complete run, not a code change. AC1
  (stack bring-up), AC3 (webhook wiring), and AC6 (transcript doc) are
  met live with objective evidence (HTTP 200 on :8080, persisted webhook
  record on instance turma-c, comprehensive transcript with timestamps).
  AC2 is partially met: .env.example declares all 7 required vars, but
  the runtime .env is missing 3 (CHATBOT_WEBHOOK_TOKEN, AI_PROVIDER,
  AI_MODEL) and has 1 empty (DEEPSEEK_API_KEY) — this is owned by Credo
  and is an operator-side gap, not a code defect. AC4 (QR pairing) and
  AC5 (live message send) are BLOCKED on a real WhatsApp test number
  + a running FastAPI server, both operator-side steps that the SDC
  engine subagent cannot perform in a sandboxed CLI. The story-file
  work (Risks table, DoD elaboration, 6-row Risks + 2 monitorised) is
  complete and 170/170 pytest stays green (no code changed in this
  story). Verdict CONCERNS is appropriate: story-file work is Done,
  bring-up work is Done, env-var wiring is Partial (Credo-owned),
  live E2E is Blocked (operator-owned). No HIGH/CRITICAL code defects;
  the 3 active blockers are all MEDIUM-severity environmental gaps
  with clear resolution paths documented in the transcript.
reviewer: Quinn
updated: '2026-06-08T20:55:00Z'
verified_by: >
  SDC engine Phase 4 (Story Development Cycle). Pre-drafted gate
  re-executed end-to-end: walked 6 ACs against transcript
  (docs/qa/evolution-acceptance-9.1.md), 170/170 pytest re-verified
  (no code touched in Story 9.1, only docs), security review
  confirmed no new secrets in committed files (.env.evolution is
  gitignored, .env runtime gap is operator-owned), documentation
  review confirmed Risks table + DoD section + Epic DoD cross-ref
  are all in place. 7/7 quality checks executed; 6 PASS + 1 CONCERNS
  (Acceptance criteria, due to partial-complete AC2 + blocked AC4+AC5).
  Status in story 9.1 advanced to InReview pending Credo follow-up
  + @devops push of docs.

checks:
  code_review:
    status: pass
    notes: >
      Story 9.1 is a docs-only change. The story file received PO-9.1-01
      (Risks table with 4 mandatory + 2 monitorised rows: R1 Docker
      availability, R2 QR pairing window, R3 network egress, R4 delivery
      latency, R5 default EVOLUTION_API_KEY, R6 AI_MODEL deprecation) and
      PO-9.1-02 (DoD elaboration: tasks checklist with explicit per-task
      criteria, Definition of Done section, AC5-specific evidence table,
      Epic-level DoD cross-reference). No Python code changed in this
      story — confirmed by git status (only docs/stories/9.1.* and
      docs/qa/evolution-acceptance-9.1.md added/modified, plus this gate
      yml). Patterns in story file match the conventions of 9.0 (atomic
      commit messages, story-id footer, Status field transitions logged
      in Change Log).

  unit_tests:
    status: pass
    notes: >
      170/170 pytest green in 5.70s (per transcript, full backend suite,
      not just the chatbot slice). No code changed in this story, so the
      test suite stability is by construction. Story 9.0's pytest baseline
      of 15/15 chatbot tests plus the broader 170/170 backend suite both
      remain green. Warnings present (httpx/StarletteDeprecationWarning,
      sqlite3 datetime adapter deprecation) are pre-existing and not
      caused by this story.

  acceptance_criteria:
    status: concern
    notes: >
      AC1 PASS — docker-compose.evolution.yml brings up 3/3 containers
      (evolution_api, evolution_redis, evolution_postgres) Up on :8080;
      GET http://localhost:8080/ returns HTTP 200 in 0.719s with
      Evolution API v2.3.7. Note: compose file has no `test:` healthcheck
      blocks, so "healthy" is interpreted as Up + HTTP 200 on root.
      AC2 PARTIAL — .env.example declares all 7 vars (DEEPSEEK_API_KEY,
      CHATBOT_WEBHOOK_TOKEN, AI_PROVIDER, AI_MODEL, EVOLUTION_BASE_URL,
      EVOLUTION_API_KEY, EVOLUTION_INSTANCE) ✅; runtime .env has 4/7:
      EVOLUTION_BASE_URL=localhost:8080 ✅, EVOLUTION_INSTANCE=turma-c ✅,
      EVOLUTION_API_KEY=default ✅, DEEPSEEK_API_KEY declared but EMPTY ⚠️,
      CHATBOT_WEBHOOK_TOKEN MISSING ❌, AI_PROVIDER MISSING ❌,
      AI_MODEL MISSING ❌. 4 lines need to be added by Credo before live
      T5 send.
      AC3 PASS — POST /webhook/set/turma-c persisted webhook to
      http://host.docker.internal:8000/api/v1/chatbot/webhook with
      events=[MESSAGES_UPSERT], enabled=true; GET /webhook/find/turma-c
      returns the same record. Instance created via POST /instance/create
      with qrcode=true, integration=WHATSAPP-BAILEYS.
      AC4 BLOCKED — requires real WhatsApp test number on phone B with
      consent. @dev (sandboxed CLI subagent) has no phone, no camera, no
      consent. T4 is an explicit human step owned by Credo per the
      story scope. Transcript documents the exact operator manual steps
      (Evolution Manager UI at :8080/manager, scan within 60-120s).
      AC5 BLOCKED — depends on T4 (no paired number to send to) +
      T2 gap (DEEPSEEK_API_KEY empty, CHATBOT_WEBHOOK_TOKEN missing,
      so FastAPI would 401 or fall back to dry-run). FastAPI server
      was not started in this run (operator step).
      AC6 PASS — docs/qa/evolution-acceptance-9.1.md exists, dated
      2026-06-08, references the story, contains the 4 evidence
      blocks required by AC5 (5a Inbound webhook, 5b DeepSeek call,
      5c Evolution send, 5d Operator attestation) with explicit
      BLOCKED markers where the live path was not executed. Operator
      attestation section intentionally left blank for Credo to
      complete after T4+T5 unblock.

  no_regressions:
    status: pass
    notes: >
      No code changes in this story (verified via git status: only
      docs/stories/9.1.boot-evolution-send-real-whatsapp.md and
      docs/qa/evolution-acceptance-9.1.md and this gate yml). The
      Story 9.0 baseline (DeepSeekProvider, ai_chatbot.py factory,
      conftest.py AI_PROVIDER=deepseek default, deleted baidu_provider,
      pyproject.toml without qianfan) is preserved unchanged. All 170
      backend tests pass — no regression in chatbot webhook, Evolution
      API client, auth, or grade publication flows.

  performance:
    status: pass
    notes: >
      N/A for an acceptance run. Bring-up: docker compose up -d completed
      in <60s for 3 containers; Evolution API responded to GET / in
      0.719s. Webhook API call: POST /webhook/set/turma-c returned
      persisted record in <1s. These are operational timings, not
      product performance characteristics — noted for completeness but
      not gating the verdict.

  security:
    status: pass
    notes: >
      No new secrets in committed files. .env.evolution is gitignored
      (per .gitignore and the Epic 9 scope). Runtime .env gap is
      operator-owned (Credo controls real DEEPSEEK_API_KEY and
      CHATBOT_WEBHOOK_TOKEN). Transcript doc does not log secret
      values — env var presence is documented in a table with
      "yes/no" only, never the actual values. Webhook uses
      CHATBOT_WEBHOOK_TOKEN (env-var-driven) for inbound auth, which
      is consistent with the 6.1 design. EVOLUTION_API_KEY is the
      default from .env.evolution; regeneration is deferred to
      Story 9.3 (runbook) per Risk R5 — acceptable for acceptance
      run, documented.

  documentation:
    status: pass
    notes: >
      Story 9.1 has the Risks table (6 rows, 4 mandatory R1-R4 +
      2 monitorised R5-R6) and the DoD section (5 numbered conditions
      + AC5-specific evidence table + Epic-level DoD cross-reference).
      Transcript doc (docs/qa/evolution-acceptance-9.1.md) is
      comprehensive: 395 lines covering pre-flight, T1-T6, blocker
      summary, recommended next actions, Appendix A (artifacts),
      Appendix B (diff summary). Epic 9 acceptance run DoD items
      ("Transcript documentado" + "Credo confirms E2E real WhatsApp
      works") are partially satisfied (transcript exists, sign-off
      pending operator). Sprint Change Proposal at
      docs/qa/change-proposals/2026-06-08-9.1-acceptance.md (if
      added later) would be the right home for the cutover
      justification.

top_issues:
  - id: B3
    from_phase3: true
    severity: medium
    category: requirements
    description: >
      Root .env missing CHATBOT_WEBHOOK_TOKEN, AI_PROVIDER, AI_MODEL;
      DEEPSEEK_API_KEY declared but empty. Owner: Credo. Until these
      4 vars are populated, FastAPI chatbot webhook returns HTTP 401
      (webhook auth fail) OR silently falls back to dry-run mode
      (no DEEPSEEK_API_KEY), and AC5 cannot be demonstrated end-to-end.
    recommendation: >
      Credo adds 4 lines to /Users/user/10_Projects/Planilha notas alunos IA/.env:
        DEEPSEEK_API_KEY=<paste from https://platform.deepseek.com/api_keys>
        CHATBOT_WEBHOOK_TOKEN=<output of: python -c "import secrets; print(secrets.token_urlsafe(32))">
        AI_PROVIDER=deepseek
        AI_MODEL=deepseek-chat
      Then restart FastAPI so the new env takes effect.

  - id: B4
    from_phase3: true
    severity: medium
    category: requirements
    description: >
      No real WhatsApp test number available in @dev (sandboxed CLI
      subagent). T4 QR pairing is a documented human step owned by
      Credo, not a code defect. Risk R2 (QR pairing window expires
      in 60-120s) is the operational risk during operator execution.
    recommendation: >
      Operator (Credo) opens http://localhost:8080/manager, logs in
      with apikey 02fb2b6a...184, selects instance turma-c, clicks
      "Get QR Code", and on phone B (real WhatsApp number with
      consent) navigates to Linked Devices → Link a Device, scans
      within 60-120s. Verify state via:
        curl http://localhost:8080/instance/connectionState/turma-c
      Expect {"state":"open"} after successful pairing.

  - id: B5
    from_phase3: true
    severity: medium
    category: requirements
    description: >
      FastAPI server not running on :8000 in this run. T5 webhook
      call (live or simulated) requires uvicorn to be started by
      the operator. Active dependency on B3 (env vars must be
      populated first) and B4 (paired WhatsApp number is the
      delivery target).
    recommendation: >
      After B3 is resolved, operator starts FastAPI in backend/:
        source ../.venv/bin/activate
        uvicorn app.main:app --reload
      Then runs T5 Option A (live inbound from phone A) or
      Option B (curl POST /api/v1/chatbot/webhook with X-Webhook-Token)
      and updates the transcript with the 4 evidence blocks
      (5a-5d) + signed operator attestation.

  - id: LOW-001
    from_phase3: false
    carry_over_from: '9.0'
    severity: low
    category: docs
    description: >
      Carry-over from Story 9.0 LOW-002: docs/architecture/system-architecture.md
      still has a Baidu block marked DEPRECATED without a prominent
      "As of 2026-06-08 the active provider is DeepSeek" banner. Not
      blocking for Story 9.1 (the gate verdict is for acceptance run,
      not architecture doc). Mentioned for traceability only.
    recommendation: >
      Add the banner in Story 9.3 (runbook) where documentation is
      in scope. No action required in Story 9.1.

waiver:
  active: false
  notes: >
    No waiver issued. CONCERNS verdict is the honest read of the
    partial-complete state. The 3 active blockers (B3, B4, B5) are
    operator-side gaps, not code defects, and they have clear,
    documented resolution paths. A waiver would only be appropriate
    if Story 9.1 were being closed without operator follow-up —
    which is not the current plan.

follow_up:
  active: true
  owner: Credo (operator)
  required_for_story_done: true
  actions:
    - id: FU-1
      priority: 1
      action: >
        Add 4 lines to /Users/user/10_Projects/Planilha notas alunos IA/.env
        (DEEPSEEK_API_KEY value, CHATBOT_WEBHOOK_TOKEN, AI_PROVIDER=deepseek,
        AI_MODEL=deepseek-chat). Closes B3.
      verification: >
        grep -nE '^(CHATBOT_WEBHOOK_TOKEN|DEEPSEEK_API_KEY|AI_PROVIDER|AI_MODEL)\b' .env
        should return 4 matches with non-empty values.
    - id: FU-2
      priority: 2
      action: >
        Start FastAPI server on :8000 (uvicorn app.main:app --reload
        in backend/, after source .venv/bin/activate). Closes B5
        (partially — full B5 closure requires B4 too).
      verification: >
        curl -sS http://localhost:8000/health returns 200 OK with
        {"status":"ok"} or equivalent healthcheck response.
    - id: FU-3
      priority: 3
      action: >
        Open Evolution Manager UI (http://localhost:8080/manager),
        log in with apikey, select instance turma-c, click
        "Get QR Code". On real phone B (WhatsApp with consent),
        scan the QR within 60-120s. Verify state via
        GET /instance/connectionState/turma-c returning
        {"state":"open"}. Closes B4.
      verification: >
        docker logs evolution_api 2>&1 | grep -i "turma-c.*connected"
        should return at least one matching line.
    - id: FU-4
      priority: 4
      action: >
        Fire T5 (Option A live inbound, or Option B simulated
        POST /api/v1/chatbot/webhook) and update
        docs/qa/evolution-acceptance-9.1.md with the 4 evidence
        blocks (5a-5d) including signed operator attestation.
        Closes AC5 and B5.
      verification: >
        docs/qa/evolution-acceptance-9.1.md has populated 5a/5b/5c/5d
        sections and a signed attestation line: "Operator (Credo)
        atesta que a mensagem WhatsApp acima foi recebida no telefone
        B em HH:MM:SS — Assinatura: ____".
