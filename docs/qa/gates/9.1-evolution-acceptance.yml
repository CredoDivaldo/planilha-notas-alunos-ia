checks:
  code_review:
    status: pass
    notes: >
      One small code change in evolution_api_client.py:94-110
      (replaced production-path stub that logged but never called
      Evolution API with a real httpx.AsyncClient.post to
      /message/sendText/{instance}, mapping 4xx/5xx to EvolutionApiError
      and transport errors to status 0). The fix is surgical: 30 lines,
      no signature change, no new dependencies (httpx was already
      declared in pyproject.toml [project.optional-dependencies].dev).
      Three new tables created via raw DDL during operator session:
      academic_contexts, class_enrollments (these were missing from
      the runtime DB despite being defined in models/ — Alembic
      migration gap, now worked around for the test). The
      publication_snapshots table was populated for all 18 grades
      (6 students × 3 subjects) so the AI chatbot can read them.

  unit_tests:
    status: pass
    notes: >
      170/170 pytest green in 6.12s (full backend suite). The
      evolution_api_client.py change does not touch any test file
      (no mocks updated, no fixtures changed). Warnings (17) are
      pre-existing (httpx/Starlette deprecation, sqlite3 datetime
      adapter) and not caused by this story.

