checks:
  code_review:
    status: PASS
    notes: >
      Three new components with clear separation of concerns:
      - DelegatePage.tsx (300 lines) — page-level orchestration, data fetch, search filter,
        two sub-panels.
      - DelegateHeader.tsx (56 lines) — role badge, user info, logout.
      - DelegateGradeTable.tsx (181 lines) — read-only grade table with pagination and badges.
      All file sizes well under 400-line guideline. Patterns consistent with Stories 7.5/7.6/7.8:
      shadcn Table primitives, className-based Tailwind, badge maps for status colors.
      Mock fallback (try/catch) follows project convention — if API unavailable, MOCK_STUDENTS
      is rendered so the page remains functional in dev. useEffect cleanup uses `cancelled` flag
      to prevent setState-after-unmount race. No dead code, no unused imports.
      Router additions (DelegateRoute) are additive — existing PrivateRoute/StudentRoute
      unchanged.

  lint:
    status: PASS
