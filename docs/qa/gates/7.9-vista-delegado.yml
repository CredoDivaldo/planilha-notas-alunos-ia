  performance:
    status: PASS
    notes: >
      Filter and pagination are O(n) on a list of 11 students — trivial.
      Two useEffect hooks each issue exactly one fetch on mount; both have cancelled-flag
      cleanup to prevent leaks and setState-after-unmount.
      CSV generation runs only on user click — synchronous but <1ms for 11 rows.
      No N+1, no infinite re-renders, no missing dependencies in effect arrays.

  security:
    status: PASS
    notes: >
      Defense in depth: client-side DelegateRoute (defense-secondary) + backend filtering
      by context_id from JWT (defense-primary, per story Dev Notes).
      Mock fallback in AuthContext uses hardcoded user name (Prof. Demo / Delegado Demo /
      Estudante <email>) — no real PII exposed. Mock token is 'mock-token-dev' — clearly
      marked as dev-only.
      No dangerouslySetInnerHTML, no eval, no XSS vectors.
      No localStorage leakage beyond the user object (intentional — auth persistence).
      apiFetch (already in project) abstracts Authorization header — no auth header
      manipulation possible from this story.

