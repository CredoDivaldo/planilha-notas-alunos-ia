[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
# Startup runs Alembic migrations + create_all before uvicorn binds, which can
# take well over 30s on cold start. Give the healthcheck a generous window.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
