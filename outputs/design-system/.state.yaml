notes: |
  Design System v2.0 — ULTRA-PREMIUM MINIMAL EDITION

  Complete overhaul from v1.0:
  - REMOVED all yellow decorative elements (borders, separators, backgrounds)
  - REMOVED all gradients (flat design only)
  - REMOVED rotated/tilted cards
  - REMOVED visible/colored borders (now imperceptible)
  - ADDED imperceptible borders (same color as container)
  - ADDED minimal 4px border radius (more square than round)
  - ADDED premium subtle shadows (sm, md max)
  - ADDED navy-based dark mode as default
  - ADDED sparingly yellow usage (<2%, functional only)
  - ADDED flat, serious, composed aesthetic (like 2026 standards)

  Design Philosophy:
  - Premium (no cheap visual tricks)
  - Minimal (no unnecessary elements)
  - Serious (professional, robust)
  - Composed (well-structured, breathing room)
  - Dark Mode First (Navy #0A1F47 as primary)
  - Contrast via Container Color (not borders)
  - Typography: Sans-serif only (no serif)
  - Spacing: Generous, relaxed, premium

  Component Library:
  - shadcn/ui for structure (button, input, card, dialog, table, form, badge)
  - Tailwind CSS for styling (fully customized)
  - All components follow navy + white + gray palette
  - All components WCAG 2.2 AA compliant
  - No decorative yellow, no borders, no gradients

  Ready for implementation with @dev.
